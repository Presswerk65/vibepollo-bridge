name: Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/vibepollo_bridge/manifest.json"
      

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/vibepollo_bridge/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if tag already exists
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Create Tag
        if: env.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${VERSION}
          git push origin v${VERSION}

      - name: Create Release
        if: env.exists == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}
          name: Vibepollo Bridge v${{ env.VERSION }}
          body: |
            Automated release

            Version: v${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
